<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Магазин</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body class="bg-secondary m-5 d-flex align-items-center flex-column">
    {% csrf_token %}
    <h2 class="bg-dark w-25 text-center text-light p-3 rounded-3 mt-2">Товары</h2>
    <div class="row">
    {% for item in items %}
    <div class="card m-3" style="width: 18rem;">
      <div class="card-body">
        <h5 class="card-title">{{ item.name }}</h5>
        <h6 class="card-subtitle mb-2 text-body-secondary"> {{ item.price }} {{ item.currency }}</h6>
        <p class="card-text"> {{ item.description }}</p>
        <button class="btn btn-primary" onclick="addToCart({{ item.id }}, '{{ item.name|escapejs }}')">В корзину</button>
      </div>
    </div>
    {% endfor %}
</div>
    <hr>

    <h2>Корзина</h2>
    <ul id="cart-items">
        </ul>
    <button id="pay-btn" style="display:none" onclick="checkout()">Оплатить всё</button>

    <div id="payment-box" style="display:none; margin-top: 20px;">
        <div id="payment-element"></div>
        <button id="submit-pay" style="margin-top:10px">Подтвердить оплату</button>
    </div>

    <script>
        let cart = [];

        function addToCart(id, name) {
            cart.push({ item_id: id, quantity: 1 });

            let li = document.createElement('li');
            li.innerText = name;
            document.getElementById('cart-items').appendChild(li);

            document.getElementById('pay-btn').style.display = 'block';
        }

        async function checkout() {
            const response = await fetch('/api/create-order/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify({ cart: cart })
            });

            const { client_secret } = await response.json();

            const stripe = Stripe('{{ STRIPE_PUBLIC_KEY }}');
            const elements = stripe.elements({ clientSecret: client_secret });
            const paymentElement = elements.create("payment");

            document.getElementById('payment-box').style.display = 'block';
            paymentElement.mount("#payment-element");

            document.getElementById('submit-pay').onclick = async () => {
                await stripe.confirmPayment({
                    elements,
                    confirmParams: { return_url: window.location.origin + "/success/" }
                });
            };
        }
    </script>
</body>
</html>
